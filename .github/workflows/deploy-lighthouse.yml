name: Deploy to Lighthouse

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fundpilot-lighthouse-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      vars.LIGHTHOUSE_DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      SSH_KEY_PATH: ${{ runner.temp }}/fundpilot-lighthouse-deploy-key
      SSH_KNOWN_HOSTS_PATH: ${{ runner.temp }}/fundpilot-known-hosts

    steps:
      - name: Checkout validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

      - name: Build same-origin static export
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ""

      - name: Configure deployment SSH identity
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
          LIGHTHOUSE_SSH_PRIVATE_KEY: ${{ secrets.LIGHTHOUSE_SSH_PRIVATE_KEY }}
          LIGHTHOUSE_KNOWN_HOSTS: ${{ secrets.LIGHTHOUSE_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          [[ -n "$LIGHTHOUSE_HOST" ]] || { echo "::error::LIGHTHOUSE_HOST is empty"; exit 1; }
          [[ -n "$LIGHTHOUSE_USER" ]] || { echo "::error::LIGHTHOUSE_USER is empty"; exit 1; }
          [[ -n "$LIGHTHOUSE_SSH_PRIVATE_KEY" ]] || { echo "::error::LIGHTHOUSE_SSH_PRIVATE_KEY is empty"; exit 1; }
          [[ -n "$LIGHTHOUSE_KNOWN_HOSTS" ]] || { echo "::error::LIGHTHOUSE_KNOWN_HOSTS is empty"; exit 1; }
          [[ "$DEPLOY_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::Invalid deploy SHA"; exit 1; }
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$LIGHTHOUSE_SSH_PRIVATE_KEY" | tr -d '\r' > "$SSH_KEY_PATH"
          printf '%s\n' "$LIGHTHOUSE_KNOWN_HOSTS" | tr -d '\r' > "$SSH_KNOWN_HOSTS_PATH"
          chmod 600 "$SSH_KEY_PATH" "$SSH_KNOWN_HOSTS_PATH"
          ssh-keygen -y -f "$SSH_KEY_PATH" >/dev/null

      - name: Stage frontend and deploy exact commit
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
        run: |
          set -euo pipefail
          target="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          release_web="/srv/fundpilot/releases/${DEPLOY_SHA}/web"
          remote_script="/tmp/fundpilot-deploy-${DEPLOY_SHA}.sh"
          ssh_options=(-i "$SSH_KEY_PATH" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o "UserKnownHostsFile=$SSH_KNOWN_HOSTS_PATH")
          ssh "${ssh_options[@]}" "$target" "mkdir -p '$release_web'"
          rsync -az --delete -e "ssh -i $SSH_KEY_PATH -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$SSH_KNOWN_HOSTS_PATH" apps/web/out/ "$target:$release_web/"
          scp "${ssh_options[@]}" deploy/lighthouse/deploy.sh "$target:$remote_script"
          ssh "${ssh_options[@]}" "$target" "chmod 700 '$remote_script' && { '$remote_script' '$DEPLOY_SHA'; status=\$?; rm -f '$remote_script'; exit \$status; }"

      - name: Record deployed commit
        run: echo "Deployed Lighthouse commit \`$DEPLOY_SHA\`" >> "$GITHUB_STEP_SUMMARY"
