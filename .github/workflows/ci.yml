name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --retries 10 --default-timeout=120 -r requirements.txt
      - name: Run pytest
        run: python -m pytest tests -q -n auto --dist loadscope
        env:
          FUND_AI_DATABASE_URL: ""
          FUND_AI_OCR_PRELOAD: "false"
          FUND_AI_NEWS_ENABLED: "false"
          FUND_AI_NEWS_SUMMARIZE: "false"
          FUND_AI_SECTOR_SIGNAL_BACKTEST_ENABLED: "false"
          FUND_AI_TACTICAL_PROMPT_TUNING_ENABLED: "false"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: api
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install backend
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --retries 10 --default-timeout=120 -r requirements.txt
      - name: Install frontend
        run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npm run test:e2e
        env:
          CI: "true"
          FUND_AI_DB_PATH: ${{ github.workspace }}/data/ci-e2e.db
          FUND_AI_DEEPSEEK_API_KEY: your-deepseek-key
          FUND_AI_NEWS_ENABLED: "false"
          FUND_AI_NEWS_SUMMARIZE: "false"
          FUND_AI_SECTOR_SIGNAL_BACKTEST_ENABLED: "false"
          FUND_AI_TACTICAL_PROMPT_TUNING_ENABLED: "false"
          FUND_AI_OCR_PRELOAD: "false"
          FUND_AI_NAV_TREND_DAYS: "20"
