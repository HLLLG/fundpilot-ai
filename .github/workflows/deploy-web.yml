name: Deploy Web to CloudBase

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TCB_ENV_ID: fundpilot-ai-d1g1j23iof248e1ec
  NEXT_PUBLIC_API_BASE_URL: https://fundpilot-api-269544-5-1392809852.sh.run.tcloudbase.com

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@3.5.6

      - name: Login CloudBase CLI
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          CI: "true"
        run: |
          if [ -z "$TCB_SECRET_ID" ] || [ -z "$TCB_SECRET_KEY" ]; then
            echo "::error::TCB_SECRET_ID / TCB_SECRET_KEY 为空，请在仓库 Settings → Secrets 中配置。"
            exit 1
          fi
          printf 'n\n' | tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY" --yes

      - name: Deploy to fundpilot-web
        env:
          CI: "true"
        run: tcb app deploy --force --yes
