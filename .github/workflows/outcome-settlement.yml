name: Decision Outcome Settlement

on:
  schedule:
    - cron: "35 23 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: decision-outcome-settlement-production
  cancel-in-progress: false

jobs:
  settle:
    if: vars.LIGHTHOUSE_DEPLOY_ENABLED == 'true' && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Configure Lighthouse SSH identity
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
          LIGHTHOUSE_SSH_PRIVATE_KEY: ${{ secrets.LIGHTHOUSE_SSH_PRIVATE_KEY }}
          LIGHTHOUSE_KNOWN_HOSTS: ${{ secrets.LIGHTHOUSE_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          SSH_KEY_PATH=$RUNNER_TEMP/fundpilot-outcome-settlement-key
          SSH_KNOWN_HOSTS_PATH=$RUNNER_TEMP/fundpilot-outcome-settlement-known-hosts
          printf 'SSH_KEY_PATH=%s\nSSH_KNOWN_HOSTS_PATH=%s\n' \
            "$SSH_KEY_PATH" "$SSH_KNOWN_HOSTS_PATH" >> "$GITHUB_ENV"
          [[ -n "$LIGHTHOUSE_HOST" ]] || { echo "::error::LIGHTHOUSE_HOST is empty"; exit 1; }
          [[ -n "$LIGHTHOUSE_USER" ]] || { echo "::error::LIGHTHOUSE_USER is empty"; exit 1; }
          [[ -n "$LIGHTHOUSE_SSH_PRIVATE_KEY" ]] || { echo "::error::LIGHTHOUSE_SSH_PRIVATE_KEY is empty"; exit 1; }
          [[ -n "$LIGHTHOUSE_KNOWN_HOSTS" ]] || { echo "::error::LIGHTHOUSE_KNOWN_HOSTS is empty"; exit 1; }
          printf '%s\n' "$LIGHTHOUSE_SSH_PRIVATE_KEY" | tr -d '\r' > "$SSH_KEY_PATH"
          printf '%s\n' "$LIGHTHOUSE_KNOWN_HOSTS" | tr -d '\r' > "$SSH_KNOWN_HOSTS_PATH"
          chmod 600 "$SSH_KEY_PATH" "$SSH_KNOWN_HOSTS_PATH"
          ssh-keygen -y -f "$SSH_KEY_PATH" >/dev/null

      - name: Settle pending T+N outcomes in production
        id: settlement
        continue-on-error: true
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
        run: |
          set -euo pipefail
          target="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          ssh_options=(-i "$SSH_KEY_PATH" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o "UserKnownHostsFile=$SSH_KNOWN_HOSTS_PATH")
          ssh "${ssh_options[@]}" "$target" \
            "cd /srv/fundpilot/repo && docker compose --env-file .env.production -f docker-compose.production.yml exec -T api python scripts/settle_pending_outcomes.py"

      - name: Persist point-in-time decision-quality snapshots
        id: quality-snapshot
        if: always()
        continue-on-error: true
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
        run: |
          set -euo pipefail
          target="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          evaluation_as_of="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ssh_options=(-i "$SSH_KEY_PATH" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o "UserKnownHostsFile=$SSH_KNOWN_HOSTS_PATH")
          ssh "${ssh_options[@]}" "$target" \
            "cd /srv/fundpilot/repo && docker compose --env-file .env.production -f docker-compose.production.yml exec -T api python scripts/evaluate_decision_quality.py --all-users --evaluation-as-of '$evaluation_as_of' --window-days 365 --format summary"

      - name: Record settlement contract
        if: always()
        run: |
          echo "Settlement step outcome: ${{ steps.settlement.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Decision-quality snapshot step outcome: ${{ steps.quality-snapshot.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Attempted post-commit receipt reconciliation, daily T+1/T+5/T+20, discovery T+5/T+20/T+60, and forward-only candidate T+20 settlement." >> "$GITHUB_STEP_SUMMARY"
          echo "Contract: D4 candidate labels require audit/outcome post-commit receipts plus live calendar/NAV adapter-output receipts; missing evidence remains pending and never becomes zero." >> "$GITHUB_STEP_SUMMARY"
          echo "Contract: legacy candidate v3/v2 artifacts are manifested only and are never upgraded into D4 metrics." >> "$GITHUB_STEP_SUMMARY"
          echo "Contract: terminal observations are immutable and readiness never auto-promotes a strategy." >> "$GITHUB_STEP_SUMMARY"

      - name: Fail after isolated settlement and snapshot attempts
        if: always()
        run: |
          settlement_outcome='${{ steps.settlement.outcome }}'
          snapshot_outcome='${{ steps.quality-snapshot.outcome }}'
          if [[ "$settlement_outcome" != "success" || "$snapshot_outcome" != "success" ]]; then
            echo "::error::settlement=$settlement_outcome quality_snapshot=$snapshot_outcome"
            exit 1
          fi
