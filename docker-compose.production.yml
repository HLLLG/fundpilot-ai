name: fundpilot

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:13306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - /srv/fundpilot/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 18

  api:
    image: ${FUND_AI_API_IMAGE:-fundpilot-api:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_LOCAL_OCR: ${INSTALL_LOCAL_OCR:-true}
    restart: unless-stopped
    env_file: .env.production
    environment:
      FUND_AI_PROJECT_ROOT: /app
      FUND_AI_RUNTIME_ROLE: api
      FUND_AI_BACKGROUND_WORKER_HEARTBEAT_PATH: /app/data/background-worker-heartbeat.json
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - /srv/fundpilot/data:/app/data
      - /srv/fundpilot/uploads:/app/uploads
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    image: ${FUND_AI_API_IMAGE:-fundpilot-api:latest}
    restart: unless-stopped
    env_file: .env.production
    environment:
      FUND_AI_PROJECT_ROOT: /app
      FUND_AI_RUNTIME_ROLE: worker
      FUND_AI_BACKGROUND_WORKER_HEARTBEAT_PATH: /app/data/background-worker-heartbeat.json
    command: ["python", "-m", "app.background_worker"]
    volumes:
      - /srv/fundpilot/data:/app/data
      - /srv/fundpilot/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.background_worker", "--healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    stop_grace_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/fundpilot/web:/usr/share/nginx/html:ro
      - ./deploy/nginx/fundpilot.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
