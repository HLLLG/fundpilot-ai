server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name hllingxi.cn www.hllingxi.cn _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 308 https://www.hllingxi.cn$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hllingxi.cn;

    ssl_certificate /etc/letsencrypt/live/hllingxi.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hllingxi.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:FundPilotSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    return 308 https://www.hllingxi.cn$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name www.hllingxi.cn;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/hllingxi.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hllingxi.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:FundPilotSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Next.js static export emits route.html plus route/ RSC data directories.
    # Serve trailing-slash requests from HTML instead of the index-less data
    # directories, which nginx would otherwise answer with 403.
    location = /login/ {
        try_files /login.html =404;
    }

    location = /register/ {
        try_files /register.html =404;
    }

    location = /settings/ {
        try_files /settings.html =404;
    }

    location = /admin/users/ {
        try_files /admin/users.html =404;
    }

    location = /reset-password/ {
        try_files /reset-password.html =404;
    }

    location / {
        try_files $uri.html $uri $uri/ /index.html;
    }
}
