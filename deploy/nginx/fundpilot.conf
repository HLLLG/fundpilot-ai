upstream fundpilot_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name hllingxi.cn www.hllingxi.cn _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 308 https://www.hllingxi.cn$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hllingxi.cn;

    ssl_certificate /etc/letsencrypt/live/hllingxi.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hllingxi.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:FundPilotSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    return 308 https://www.hllingxi.cn$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name www.hllingxi.cn;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/hllingxi.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hllingxi.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:FundPilotSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;
    etag on;

    # Long-lived event streams need immediate forwarding and a long idle
    # timeout. Keep this policy scoped to the two analysis streams and chat
    # streams; ordinary JSON responses use the buffered location below.
    location = /api/analyze/stream {
        proxy_pass http://fundpilot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /api/fund-discovery/stream {
        proxy_pass http://fundpilot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location ~ ^/api/(?:fund-discovery/)?reports/[^/]+/chat$ {
        proxy_pass http://fundpilot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Normal JSON APIs benefit from upstream connection reuse, response
    # buffering, gzip and bounded timeouts. Authentication and user-private
    # responses remain uncached.
    location /api/ {
        proxy_pass http://fundpilot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_cache off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location ^~ /_next/static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Next.js static export emits route.html plus route/ RSC data directories.
    # Serve trailing-slash requests from HTML instead of the index-less data
    # directories, which nginx would otherwise answer with 403.
    location = /login/ {
        try_files /login.html =404;
        expires -1;
    }

    location = /register/ {
        try_files /register.html =404;
        expires -1;
    }

    location = /settings/ {
        try_files /settings.html =404;
        expires -1;
    }

    location = /admin/users/ {
        try_files /admin/users.html =404;
        expires -1;
    }

    location = /reset-password/ {
        try_files /reset-password.html =404;
        expires -1;
    }

    location / {
        try_files $uri.html $uri $uri/ /index.html;
        expires -1;
    }
}
