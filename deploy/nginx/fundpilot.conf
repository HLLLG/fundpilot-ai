server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # Next.js static export emits route.html plus route/ RSC data directories.
    # Serve trailing-slash requests from HTML instead of the index-less data
    # directories, which nginx would otherwise answer with 403.
    location = /login/ {
        try_files /login.html =404;
    }

    location = /register/ {
        try_files /register.html =404;
    }

    location = /settings/ {
        try_files /settings.html =404;
    }

    location / {
        try_files $uri.html $uri $uri/ /index.html;
    }
}
